# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      # Setup Flutter with cache
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: cap_app/.dart_tool
          key: ${{ runner.os }}-dart-${{ hashFiles('cap_app/pubspec.lock') }}
          restore-keys: ${{ runner.os }}-dart-

      # Quality checks
      - name: Install dependencies
        working-directory: cap_app
        run: flutter pub get

      - name: Analyze code
        working-directory: cap_app
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        working-directory: cap_app
        run: flutter test

      # Build Flutter web
      - name: Build web
        working-directory: cap_app
        run: flutter build web --release
      
      # Deploy to Firebase
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_CAPPROJET_DBF3F }}
          channelId: live
          projectId: capprojet-dbf3f
          entryPoint: cap_app
