name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      # Setup Flutter
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'
      
      # Build Flutter web
      - name: Install dependencies
        working-directory: cap_app
        run: flutter pub get
        
      - name: Build web
        working-directory: cap_app
        run: flutter build web --release
      
      # Deploy to Firebase
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_CAPPROJET_DBF3F }}
          channelId: live
          projectId: capprojet-dbf3f
          entryPoint: cap_app
